# 阿里云函数计算部署配置
# s.yaml (Serverless Devs 配置)

edition: 3.0.0
name: imgetter-backend
access: aliyunfs

vars:
  region: cn-hangzhou

resources:
  imgetter-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: imgetter-api
      description: "ImGetter 图片采集 API"
      runtime: python3.10
      handler: app.handler.handler
      memorySize: 1024
      cpu: 0.5
      diskSize: 10240
      timeout: 30
      internetAccess: true
      code: ./
      environmentVariables:
        ENV: production
        PYTHONPATH: /var/runtime/site-packages:/var/task
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
